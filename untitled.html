<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find All the Animals</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      text-align:center;
      background: linear-gradient(to bottom, #87ceeb, #e6f7ff);
    }h1{margin:15px 0;}
#counter{font-weight:bold;}

#game{
  position:relative;
  width:95%;
  max-width:900px;
  height:520px;
  margin:15px auto;
  border-radius:20px;
  overflow:hidden;
  border:4px solid #fff;
  background:url('https://images.unsplash.com/photo-1522708323590-d24dbb6b0267') center/cover;
}

#game::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 15% 25%, rgba(255,255,255,0.10), transparent 45%),
    radial-gradient(circle at 70% 60%, rgba(0,0,0,0.12), transparent 50%);
  pointer-events:none;
}

.animal{
  position:absolute;
  width:46px;
  height:46px;
  cursor:pointer;
  user-select:none;
  transition:0.2s;
  filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
}

.animal img{width:46px;}

.found{
  border:3px solid red;
  border-radius:50%;
  padding:3px;
  background:rgba(255,255,255,0.15);
}

button{
  padding:10px 18px;
  margin:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
}

#hintBtn{background:#ffcc00; display:none;}

#msg{font-size:22px; margin-top:10px; font-weight:bold;}

#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.box{
  background:white;
  padding:20px;
  border-radius:15px;
  width:280px;
}

.box button{
  width:100%;
  margin-top:8px;
}

.glasses{
  position:absolute;
  top:-10px;
  left:0;
  width:100%;
  font-size:26px;
}

  </style>
</head>
<body><h1>🦊 Find All the Animals</h1>
<p id="counter">Animals Found: 0/8</p><div id="game"></div><button id="hintBtn">Need a Hint?</button>

<div id="msg"></div><!-- AUDIO --><audio id="clickSound" src="pop.mp3"></audio> <audio id="bgSound" src="Game.mp3" loop></audio> <audio id="winSound" src="cat-laugh.mp3"></audio>

<div id="modal">
  <div class="box">
    <p id="modalText"></p>
    <div id="options"></div>
  </div>
</div><script>
const game=document.getElementById('game');
const counter=document.getElementById('counter');
const hintBtn=document.getElementById('hintBtn');
const msg=document.getElementById('msg');
const modal=document.getElementById('modal');
const modalText=document.getElementById('modalText');
const options=document.getElementById('options');

const clickSound=document.getElementById('clickSound');
const bgSound=document.getElementById('bgSound');
const winSound=document.getElementById('winSound');

let started=false;
let found=0;
let foundSet=new Set();
let lastSpawned=false;

const animals=[
  {x:'6%',y:'18%'},{x:'18%',y:'75%'},{x:'35%',y:'42%'},
  {x:'52%',y:'68%'},{x:'78%',y:'25%'},{x:'12%',y:'88%'},
  {x:'85%',y:'78%'},{x:'55%',y:'35%'}
];

function startAudio(){
  if(!started){
    bgSound.volume=0.4;
    bgSound.play().catch(()=>{});
    started=true;
  }
}

function playClick(){
  clickSound.currentTime=0;
  clickSound.play();
}

function createAnimal(i){
  const d=document.createElement('div');
  d.className='animal';

  d.style.left=animals[i].x;
  d.style.top=animals[i].y;

  d.innerHTML='<img src="https://cdn-icons-png.flaticon.com/512/3069/3069172.png">';

  d.onclick=()=>{
    startAudio();
    playClick();

    if(foundSet.has(i))return;

    foundSet.add(i);
    d.classList.add('found');
    d.style.pointerEvents='none';

    found++;
    counter.innerText=`Animals Found: ${found}/8`;

    if(found===7) hintBtn.style.display='inline-block';

    if(found===8){
      msg.innerText='Chasmis kahiki 🤓🤣';
      winSound.play();
    }
  };

  game.appendChild(d);
}

for(let i=0;i<7;i++) createAnimal(i);

function openModal(text,btns){
  modal.style.display='flex';
  modalText.innerText=text;
  options.innerHTML='';

  btns.forEach(b=>{
    const btn=document.createElement('button');
    btn.innerText=b.text;
    btn.onclick=()=>{
      modal.style.display='none';
      b.onClick();
    };
    options.appendChild(btn);
  });
}

hintBtn.onclick=()=>{
  hintBtn.style.display='none';

  openModal('Wear your glasses 👓',[
    {text:'Yeah',onClick:()=>{
      openModal('Did you wear it?',[
        {text:'Yeah',onClick:()=>{
          openModal('Are you sure?',[
            {text:'Yeah',onClick:()=>{
              openModal('Xitto chasma laga gawacth 😡',[
                {text:'Yeah',onClick:spawnLast},
                {text:'No',onClick:()=>msg.innerText='Game Over 😂'}
              ]);
            }},
            {text:'No',onClick:()=>msg.innerText='Game Over 😆'}
          ]);
        }},
        {text:'No',onClick:()=>msg.innerText='Game Over 🤣'}
      ]);
    }},
    {text:'No',onClick:()=>msg.innerText='Game Over 😂'}
  ]);
};

function spawnLast(){
  if(lastSpawned)return;
  lastSpawned=true;

  const d=document.createElement('div');
  d.className='animal';

  d.style.left='62%';
  d.style.top='55%';

  d.innerHTML='<img src="https://cdn-icons-png.flaticon.com/512/3069/3069172.png">';

  d.onclick=()=>{
    startAudio();
    playClick();

    if(foundSet.has(7))return;

    foundSet.add(7);
    d.classList.add('found');

    found++;
    counter.innerText=`Animals Found: ${found}/8`;

    msg.innerText='Chasmis kahiki 🤓🤣';
    winSound.play();
  };

  game.appendChild(d);
}
</script></body>
</html>
